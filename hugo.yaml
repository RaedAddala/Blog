baseURL: https://raedaddala.github.io/
languageCode: en-us
title: Raed's Forge

theme: ["PaperMod"]

copyright: '© 2025 Raed Addala - Content licensed under <a href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank" rel="noopener">CC BY-NC 4.0</a>'

pagination:
  pagerSize: 5

enableRobotsTXT: true
canonifyURLs: true

minify:
  disableXML: true
  minifyOutput: true

fingerprint:
  disableCSS: false
  disableJS: false
  disableHTML: false

outputs:
  home:
    - HTML
    - RSS
    - JSON
#    - llms

sitemap:
  changefreq: "weekly"
  priority: 0.5

params:
  env: production

  description: "This is my Portfolio and my Blog where I share my projects and my thoughts on Distributed Systems and other topics."
  keywords:
    [
      Blog,
      Portfolio,
      Distributed Systems,
      Blockchain,
      Apache Kafka,
      Rust,
      Actor Model,
      Software Internals,
    ]
  author: "Addala Raed"
  images: ["/og_image.jpg"]
  DateFormat: "January 2, 2006"
  defaultTheme: auto
  
  twitterCards: true
  twitter: "@AddalaRaed"

  assets:
    favicon: "/favicon.ico"
    favicon16x16: "/assets/favicon-16x16.png"
    favicon32x32: "/assets/favicon-32x32.png"
    apple_touch_icon: "/assets/apple-touch-icon.png"
    android_chrome_192: "/assets/android-chrome-192x192.png"
    android_chrome_512: "/assets/android-chrome-512x512.png"
    themeColor: "#ffffff"

  pwa: true
  
  ShowReadingTime: true
  ShowWordCount: true

  ShowShareButtons: true

  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowFullTextinRSS: true
  
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false

  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: true

  comments: true
  ShowSearchBar: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

  ShowRelatedPosts: 5
  limitPagerPosts: 5
  coverImageDir: "/images/"
  ShowTaxonomiesInFooter: true

  socialIcons:
    - name: email
      url: "mailto:addala.raed@gmail.com"
    - name: github
      url: "https://github.com/RaedAddala"
    - name: linkedin
      url: "https://www.linkedin.com/in/addalaraed/"
    - name: twitter
      url: "https://x.com/AddalaRaed"
    - name: stackoverflow
      url: "https://stackoverflow.com/users/11842805/raed-addala"
    - name: kaggle
      url: "https://www.kaggle.com/raedaddala"
    - name: codeforces
      url: "https://codeforces.com/profile/MekraziRaed"
    - name: "rss"
      url: "https://raedaddala.github.io/index.xml"

  profileMode:
    enabled: true
    title: "Addala Raed"
    subtitle: "Software engineering student passionate about distributed systems, backend technologies, and innovative projects that blend theory with real-world impact."
    imageUrl: "https://avatars.githubusercontent.com/u/56173312?v=4"
    imageWidth: 120
    imageHeight: 120
    imageTitle: "Raed Addala's profile picture"
    buttons:
      - name: Portfolio
        url: "/projects/"
      - name: Blog
        url: "/posts/"
  

services:
  googleAnalytics:
    id: "G-V8V895X3G4"

menu:
  main:
    - identifier: profile
      name: Profile
      url: /
      weight: 10
    - identifier: projects
      name: Projects
      url: /projects/
      weight: 20
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 30
    - identifier: categories
      name: Categories
      url: /categories/
      weight: 40
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 50
    - identifier: archives
      name: Archives
      url: /archives/
      weight: 60


markup:
  goldmark:
    renderer:
      unsafe: true