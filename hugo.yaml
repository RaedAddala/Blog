baseURL: https://raedaddala.github.io/
languageCode: en-us
title: Raed's Forge

theme: ["PaperMod"]

pagination:
  pagerSize: 5

enableRobotsTXT: true

minify:
  disableXML: true
  minifyOutput: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production

  description: "This is my Portfolio and my Blog where I share my projects and my thoughts on Distributed Systems and other topics."
  keywords:
    [
      Blog,
      Portfolio,
      Distributed Systems,
      Blockchain,
      Apache Kafka,
      Rust,
      Actor Model,
      Software Internals,
    ]
  author: "Addala Raed"

  DateFormat: "January 2, 2006"
  defaultTheme: auto

  ShowReadingTime: true
  ShowWordCount: true

  ShowShareButtons: true

  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true

  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false

  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: true

  comments: true
  ShowSearchBar: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

  socialIcons:
    - name: email
      url: "mailto:addala.raed@gmail.com"
    - name: github
      url: "https://github.com/RaedAddala"
    - name: linkedin
      url: "https://www.linkedin.com/in/addalaraed/"
    - name: twitter
      url: "https://x.com/AddalaRaed"
    - name: stackoverflow
      url: "https://stackoverflow.com/users/11842805/raed-addala"
    - name: kaggle
      url: "https://www.kaggle.com/raedaddala"
    - name: codeforces
      url: "https://codeforces.com/profile/MekraziRaed"

  profileMode:
    enabled: true
    title: "Addala Raed"
    subtitle: "Software engineering student passionate about distributed systems, backend technologies, and innovative projects that blend theory with real-world impact."
    imageUrl: "https://avatars.githubusercontent.com/u/56173312?v=4"
    imageWidth: 120
    imageHeight: 120
    imageTitle: "Raed Addala's profile picture"
    buttons:
      - name: Portfolio
        url: "/projects/"
      - name: Blog
        url: "/posts/"

assets:
  - favicon16x16: /assets/favicon-16x16.png
  - favicon32x32: /assets/favicon-32x32.png
  - apple_touch_icon: /assets/apple-touch-icon.png
  - android_chrome_192x192: /assets/android-chrome-192x192.png
  - android_chrome_512x512: /assets/android-chrome-512x512.png

favicon: favicon.ico

services:
  googleAnalytics:
    id: "G-V8V895X3G4"

menu:
  main:
    - identifier: profile
      name: Profile
      url: /
      weight: 10
    - identifier: projects
      name: Projects
      url: /projects/
      weight: 20
    - identifier: categories
      name: Categories
      url: /categories/
      weight: 30
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 40
    - identifier: archives
      name: Archives
      url: /archives/
      weight: 50
