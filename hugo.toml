enableRobotsTXT = true
canonifyURLs = false
enableGitInfo = true

[pagination]
pagerSize = 5

[minify]
disableXML = true
minifyOutput = true

[outputs]
home = ["HTML", "RSS", "JSON"]
section = ["HTML"]
taxonomy = ["HTML"]
term = ["HTML"]

[sitemap]
changefreq = "weekly"
priority = 0.5

[taxonomies]
tag = "tags"
category = "categories"
series = "series"

[related]
threshold = 80
includeNewer = true
toLower = true

[[related.indices]]
name = "tags"
weight = 100

[[related.indices]]
name = "categories"
weight = 80

[[related.indices]]
name = "date"
weight = 10

[params]
env = "production"
description = "Portfolio of Raed Addala, a software engineering student at INSAT focused on distributed systems and AI, currently finishing an end-of-studies internship in federated learning."
