baseURL = "https://raedaddala.github.io/"
locale = "en-us"
title = "Raed Addala"
theme = "PaperMod"
copyright = "© 2026 Raed Addala - Content licensed under <a href=\"https://creativecommons.org/licenses/by-nc/4.0/\" target=\"_blank\" rel=\"noopener\">CC BY-NC 4.0</a>."
enableRobotsTXT = true
canonifyURLs = false

[pagination]
pagerSize = 5

[minify]
disableXML = true
minifyOutput = true

[outputs]
home = ["HTML", "RSS", "JSON"]
section = ["HTML"]
taxonomy = ["HTML"]
term = ["HTML"]

[sitemap]
changefreq = "weekly"
priority = 0.5

[taxonomies]
tag = "tags"
category = "categories"
series = "series"

[related]
threshold = 80
includeNewer = true
toLower = true

[[related.indices]]
name = "tags"
weight = 100

[[related.indices]]
name = "categories"
weight = 80

[[related.indices]]
name = "date"
weight = 10

[params]
env = "production"
description = "Software engineering student portfolio and technical blog focused on backend engineering, distributed systems, and applied projects."
keywords = ["software engineering", "portfolio", "backend", "distributed systems", "Apache Kafka", "Hugo", "technical blog", "blockchain", "Rust", "actor model", "software internals"]
author = "Raed Addala"
images = ["/og-image.jpg"]
DateFormat = "January 2, 2006"
defaultTheme = "auto"
mainSections = ["posts", "projects"]

ShowReadingTime = true
ShowWordCount = true
ShowCodeCopyButtons = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowRssButtonInSectionTermList = true
ShowFullTextinRSS = true
ShowShareButtons = true
twitterCards = true
ShowToc = true
TocOpen = false
showtoc = true
tocopen = false
ShowAllPagesInArchive = true
ShowTaxonomiesInPost = true
ShowPageNums = true
UseHugoToc = true
disableSpecial1stPost = false
disableScrollToTop = false
hidemeta = false
hideSummary = false
comments = false
ShowSearchBar = true
ShowRelatedPosts = 5
limitPagerPosts = 5
coverImageDir = "/images/"
ShowTaxonomiesInFooter = true

[params.assets]
favicon = "/favicon.ico"
favicon16x16 = "/assets/favicon-16x16.png"
favicon32x32 = "/assets/favicon-32x32.png"
apple_touch_icon = "/assets/apple-touch-icon.png"
android_chrome_192 = "/assets/android-chrome-192x192.png"
android_chrome_512 = "/assets/android-chrome-512x512.png"
themeColor = "#1e1e1e"

[params.pwa.manifest]
name = "Raed Addala"
short_name = "Raed"
description = "Portfolio and technical blog on software engineering, backend systems, and distributed systems."
start_url = "/"
scope = "/"
display = "standalone"
background_color = "#ffffff"
theme_color = "#1e1e1e"

[params.cover]
responsiveImages = true
linkFullImages = true

[params.fuseOpts]
isCaseSensitive = false
shouldSort = true
location = 0
distance = 1000
threshold = 0.3
minMatchCharLength = 2
keys = ["title", "permalink", "summary", "content", "tags", "categories"]

[params.social]
twitter = "AddalaRaed"

[params.profileMode]
enabled = true
title = "Raed Addala"
subtitle = "Software engineering student focused on backend systems, distributed systems, and practical engineering projects."
imageUrl = "https://avatars.githubusercontent.com/u/56173312?v=4"
imageTitle = "Raed Addala's profile picture"
